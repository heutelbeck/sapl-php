name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Lint, analyse, unit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: mongodb
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Check code style
        run: composer cs-check

      - name: Static analysis
        run: composer stan

      - name: Unit tests
        run: vendor/bin/phpunit --testsuite unit

  integration:
    name: Integration tests (SAPL Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sapl-php
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: sapl-php

      - name: Pull SAPL Node image
        run: docker pull ghcr.io/heutelbeck/sapl-node:4.1.2

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.4'
          extensions: mongodb, pdo_pgsql, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        working-directory: sapl-php
        run: composer install --no-interaction --no-progress

      - name: Run integration tests
        working-directory: sapl-php
        run: vendor/bin/phpunit --testsuite integration
